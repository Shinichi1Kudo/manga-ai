{% extends "base.html" %}

{% block title %}创建新系列 - Manga AI{% endblock %}

{% block content %}
<!-- Progress Steps -->
<div class="step-indicator mb-16">
    <div class="step-item active">
        <div class="step-circle">1</div>
        <div class="step-label">输入信息</div>
    </div>
    <div class="step-line"></div>
    <div class="step-item">
        <div class="step-circle">2</div>
        <div class="step-label">AI 处理</div>
    </div>
    <div class="step-line"></div>
    <div class="step-item">
        <div class="step-circle">3</div>
        <div class="step-label">角色审核</div>
    </div>
    <div class="step-line"></div>
    <div class="step-item">
        <div class="step-circle">4</div>
        <div class="step-label">完成</div>
    </div>
</div>

<!-- Main Form Card -->
<div class="max-w-4xl mx-auto">
    <div class="glass-card p-10">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-500 to-blue-500 mb-6">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold gradient-text mb-3">创建新系列</h1>
            <p class="text-white/50">输入剧本信息，AI 将自动生成角色资产</p>
        </div>

        <!-- Form -->
        <form id="seriesForm" method="post" class="space-y-8">
            {% csrf_token %}
            <input type="hidden" name="characters_json" id="charactersJson">

            <!-- Series Name -->
            <div>
                <label class="block text-sm font-medium text-white/70 mb-3">
                    <i data-lucide="type" class="w-4 h-4 inline mr-2"></i>系列名称 <span class="text-red-400">*</span>
                </label>
                <input type="text" name="series_name" required
                       class="input-modern"
                       placeholder="例如：星际迷航之银河冒险"
                       value="{{ form_data.series_name|default:'' }}">
            </div>

            <!-- Outline -->
            <div>
                <label class="block text-sm font-medium text-white/70 mb-3">
                    <i data-lucide="file-text" class="w-4 h-4 inline mr-2"></i>剧本大纲 <span class="text-red-400">*</span>
                </label>
                <textarea name="outline" required class="input-modern" rows="4"
                          placeholder="描述故事的整体走向、核心冲突和结局...">{{ form_data.outline|default:'' }}</textarea>
            </div>

            <!-- Background -->
            <div>
                <label class="block text-sm font-medium text-white/70 mb-3">
                    <i data-lucide="globe" class="w-4 h-4 inline mr-2"></i>背景设定
                </label>
                <textarea name="background" class="input-modern" rows="3"
                          placeholder="时代背景、世界观、科技水平、社会结构...">{{ form_data.background|default:'' }}</textarea>
            </div>

            <!-- Character Cards Container -->
            <div>
                <div class="flex items-center justify-between mb-3">
                    <label class="text-sm font-medium text-white/70">
                        <i data-lucide="users" class="w-4 h-4 inline mr-2"></i>角色列表 <span class="text-red-400">*</span>
                    </label>
                    <button type="button" id="addCharacterBtn" class="px-4 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 transition-all text-sm font-medium flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>添加角色
                    </button>
                </div>

                <div id="characterContainer" class="space-y-4">
                    <!-- Character cards will be added here dynamically -->
                </div>
            </div>

            <!-- Submit Buttons -->
            <div class="flex items-center justify-between pt-6 border-t border-white/10">
                <a href="/" class="px-6 py-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all font-medium flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>返回首页
                </a>
                <button type="submit" class="btn-neon text-lg px-8 py-4 flex items-center gap-2">
                    <i data-lucide="wand-2" class="w-5 h-5"></i>开始创建
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let characterCount = 0;

// 创建角色卡片
function createCharacterCard(index, name = '', prompt = '') {
    const card = document.createElement('div');
    card.className = 'glass-card p-5 character-card';
    card.dataset.index = index;
    card.innerHTML = `
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3 flex-1">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center text-lg font-bold character-number">
                    ${index + 1}
                </div>
                <input type="text" class="input-modern text-base font-medium character-name flex-1" placeholder="输入角色名称..." value="${name.replace(/"/g, '&quot;')}" required>
            </div>
            <button type="button" class="remove-character-btn p-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 transition-colors ml-3" title="删除角色">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
        </div>

        <div>
            <label class="block text-xs text-white/50 mb-1">提示词</label>
            <textarea class="input-modern text-sm character-prompt" rows="3" placeholder="输入角色描述，用于生成三视图图片。例如：A young man with black short hair and sharp eyes, wearing a black trench coat, anime style, detailed, high quality character design sheet with front, side and back views">${prompt}</textarea>
        </div>
    `;

    return card;
}

// 添加角色
function addCharacter(name = '', prompt = '') {
    const container = document.getElementById('characterContainer');
    const card = createCharacterCard(characterCount, name, prompt);
    container.appendChild(card);
    characterCount++;
    lucide.createIcons();
    updateCharacterNumbers();
}

// 删除角色
function removeCharacter(card) {
    card.style.opacity = '0';
    card.style.transform = 'translateX(-20px)';
    card.style.transition = 'all 0.2s ease';
    setTimeout(() => {
        card.remove();
        updateCharacterNumbers();
    }, 200);
}

// 更新角色编号
function updateCharacterNumbers() {
    const cards = document.querySelectorAll('.character-card');
    cards.forEach((card, index) => {
        card.querySelector('.character-number').textContent = index + 1;
    });
    characterCount = cards.length;
}

// 收集角色数据
function collectCharacterData() {
    const characters = [];
    document.querySelectorAll('.character-card').forEach(card => {
        const name = card.querySelector('.character-name').value.trim();
        if (name) {
            characters.push({
                roleName: name,
                customPrompt: card.querySelector('.character-prompt').value.trim()
            });
        }
    });
    return characters;
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    // 恢复之前输入的角色数据
    const savedCharacters = {{ form_data.characters_json|default:'[]'|safe }};
    if (savedCharacters.length > 0) {
        // 有之前的数据，恢复角色卡片
        savedCharacters.forEach(char => {
            addCharacter(char.roleName || '', char.customPrompt || '');
        });
    } else {
        // 没有数据，添加一个空的角色卡片
        addCharacter();
    }

    // 添加角色按钮
    document.getElementById('addCharacterBtn').addEventListener('click', function() {
        addCharacter();
    });

    // 删除角色按钮 (事件委托)
    document.getElementById('characterContainer').addEventListener('click', function(e) {
        const btn = e.target.closest('.remove-character-btn');
        if (btn) {
            const card = btn.closest('.character-card');
            removeCharacter(card);
        }
    });

    // 表单提交
    document.getElementById('seriesForm').addEventListener('submit', function(e) {
        const characters = collectCharacterData();

        if (characters.length === 0) {
            e.preventDefault();
            alert('请至少添加一个角色（请填写角色名称）');
            return false;
        }

        // 将角色数据存入隐藏字段
        document.getElementById('charactersJson').value = JSON.stringify(characters);

        // 显示加载状态
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '创建中...';
    });
});
</script>
{% endblock %}
