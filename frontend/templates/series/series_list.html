{% extends "base.html" %}

{% block title %}首页 - Manga AI{% endblock %}

{% block content %}
<!-- Hero Section -->
<div class="text-center py-12">
    <h1 class="text-4xl font-bold mb-4">
        <span class="gradient-text">AI 智能短剧制作系统</span>
    </h1>
    <p class="text-white/50 max-w-2xl mx-auto mb-8">
        一键生成标准化角色资产，告别重复劳动，让创作更高效
    </p>
    <div class="flex items-center justify-center gap-4">
        <a href="/init/" class="btn-neon text-lg px-8 py-3 inline-flex items-center gap-2">
            <i data-lucide="plus" class="w-5 h-5"></i>创建新系列
        </a>
        <a href="/episodes/" class="px-8 py-3 rounded-xl bg-gradient-to-r from-orange-500 to-pink-500 hover:from-orange-600 hover:to-pink-600 transition-all font-medium text-lg inline-flex items-center gap-2">
            <i data-lucide="film" class="w-5 h-5"></i>剧集制作
        </a>
        <a href="/assets/library/" class="px-8 py-3 rounded-xl bg-white/10 border border-white/20 hover:bg-white/15 transition-all font-medium text-lg inline-flex items-center gap-2">
            <i data-lucide="folder-open" class="w-5 h-5"></i>我的资产库
        </a>
        <a href="/credits/records/" class="px-8 py-3 rounded-xl bg-white/10 border border-white/20 hover:bg-white/15 transition-all font-medium text-lg inline-flex items-center gap-2">
            <i data-lucide="history" class="w-5 h-5"></i>积分记录
        </a>
    </div>
</div>

<!-- Series List -->
<div class="mt-8">
    <h2 class="text-2xl font-bold mb-6">我的系列</h2>
    <div id="seriesList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="glass-card p-8 text-center col-span-full">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-white/50">加载中...</p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-4 mt-8"></div>
</div>
{% endblock %}

{% block extra_js %}
<!-- SockJS 和 STOMP.js for WebSocket -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- 删除确认弹窗 -->
<div id="deleteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
    <div class="glass-card p-6 max-w-md mx-4 text-center">
        <i data-lucide="alert-triangle" class="w-12 h-12 text-yellow-400 mx-auto mb-4"></i>
        <h3 class="text-xl font-bold mb-2">确认删除</h3>
        <p class="text-white/60 mb-4">确定要删除系列 "<span id="deleteSeriesName" class="text-violet-300"></span>" 吗？</p>
        <p class="text-white/40 text-sm mb-6">删除后可在回收站中恢复，3天后自动彻底删除</p>
        <div class="flex justify-center gap-4">
            <button onclick="closeDeleteModal()" class="px-6 py-2 rounded-lg bg-white/10 hover:bg-white/15 transition-colors">
                取消
            </button>
            <button onclick="confirmDelete()" class="px-6 py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-colors">
                确认删除
            </button>
        </div>
    </div>
</div>

<script>
// 安全调用 lucide.createIcons
function safeCreateIcons() {
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
    }
}

let currentPage = 1;
const pageSize = 9;
let totalSeries = 0;
let stompClient = null;
const processingSeries = {{ processing_series_ids|safe }};

// 从 localStorage 恢复进度
let seriesProgress = JSON.parse(localStorage.getItem('seriesProgress') || '{}');

// 保存进度到 localStorage
function saveProgress() {
    localStorage.setItem('seriesProgress', JSON.stringify(seriesProgress));
}

// 监听其他页面的 localStorage 变化，同步进度
window.addEventListener('storage', function(e) {
    if (e.key === 'seriesProgress' && e.newValue) {
        try {
            const newProgress = JSON.parse(e.newValue);

            // 更新所有处理中的卡片进度显示（只接受更大的进度）
            Object.keys(newProgress).forEach(seriesId => {
                const newProg = newProgress[seriesId];
                const currentProg = seriesProgress[seriesId];

                // 只有当新进度比当前进度大，或者是完成/失败状态时才更新
                const currentPercent = currentProg ? (currentProg.progressPercent || 0) : 0;
                const newPercent = newProg.progressPercent || 0;

                if (newPercent > currentPercent || newProg.status === 'COMPLETED' || newProg.status === 'FAILED') {
                    // 更新内存中的进度
                    seriesProgress[seriesId] = newProg;

                    const card = document.querySelector(`.series-card[data-series-id="${seriesId}"]`);
                    if (card) {
                        const progressBar = card.querySelector('.progress-bar');
                        const progressText = card.querySelector('.progress-text');
                        const progressPercentEl = card.querySelector('.progress-percent');

                        if (progressBar && newProg.progressPercent !== undefined) {
                            progressBar.style.width = newProg.progressPercent + '%';
                        }
                        if (progressText && newProg.message) {
                            progressText.textContent = newProg.message;
                        }
                        if (progressPercentEl && newProg.progressPercent !== undefined) {
                            progressPercentEl.textContent = newProg.progressPercent.toFixed(2) + '%';
                        }

                        // 处理完成状态
                        if (newProg.status === 'COMPLETED') {
                            const overlay = card.querySelector('.processing-overlay');
                            if (overlay) {
                                overlay.innerHTML = `
                                    <div class="text-center">
                                        <i data-lucide="check-circle" class="w-12 h-12 text-green-400 mx-auto mb-2"></i>
                                        <p class="text-green-400 font-medium">处理完成！</p>
                                    </div>
                                `;
                                safeCreateIcons();
                            }
                            // 停止模拟进度
                            stopFakeProgress(parseInt(seriesId));
                            // 从处理中列表移除
                            const idx = processingSeries.indexOf(parseInt(seriesId));
                            if (idx > -1) {
                                processingSeries.splice(idx, 1);
                            }
                            // 2秒后刷新
                            setTimeout(() => loadSeries(currentPage), 2000);
                        }

                        // 处理失败状态
                        if (newProg.status === 'FAILED') {
                            const overlay = card.querySelector('.processing-overlay');
                            if (overlay) {
                                overlay.innerHTML = `
                                    <div class="text-center">
                                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-2"></i>
                                        <p class="text-red-400 font-medium">${newProg.message || '处理失败'}</p>
                                    </div>
                                `;
                                safeCreateIcons();
                            }
                            stopFakeProgress(parseInt(seriesId));
                        }
                    }
                }
            });
        } catch (err) {
            console.error('同步进度失败:', err);
        }
    }
});

function loadSeries(page) {
    currentPage = page;
    const container = document.getElementById('seriesList');
    container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><div class="spinner mx-auto mb-4"></div><p class="text-white/50">加载中...</p></div>';

    // 添加时间戳防止缓存
    fetch(`/api/series/list/?page=${page}&pageSize=${pageSize}&_t=${Date.now()}`)
        .then(response => response.json())
        .then(result => {
            if (result.data && result.data.list && result.data.list.length > 0) {
                totalSeries = result.data.total;
                container.innerHTML = result.data.list.map(series => renderSeriesCard(series)).join('');
                safeCreateIcons();
                renderPagination(result.data.total, page);

                // 渲染完成后启动进度动画
                processingSeries.forEach(seriesId => startFakeProgress(seriesId));
            } else {
                container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><p class="text-white/50">暂无系列，点击上方按钮创建</p></div>';
                document.getElementById('pagination').innerHTML = '';
            }
        })
        .catch(err => {
            container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><p class="text-red-400">加载失败: ' + err.message + '</p></div>';
        });
}

function renderSeriesCard(series) {
    // 只根据系列状态判断是否处理中（不依赖 processingSeries 列表）
    const isProcessing = series.status === 0;
    const progress = seriesProgress[series.id] || {};
    // 恢复之前的进度，或者从 10% 开始，格式化为2位小数
    const progressPercent = isProcessing ? (progress.progressPercent || 10) : (progress.progressPercent || 0);
    const progressPercentDisplay = typeof progressPercent === 'number' ? progressPercent.toFixed(2) : progressPercent;
    const progressMessage = progress.message || '正在初始化...';

    if (isProcessing) {
        // 处理中状态 - 添加模拟进度动画
        return `
            <div class="glass-card p-6 relative overflow-hidden series-card" data-series-id="${series.id}">
                <!-- 处理中遮罩层 -->
                <div class="processing-overlay absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                    <div class="spinner mb-3"></div>
                    <p class="text-violet-300 text-sm mb-2 progress-text">${progressMessage}</p>
                    <div class="w-48 h-2 bg-white/20 rounded-full overflow-hidden">
                        <div class="progress-bar h-full bg-gradient-to-r from-violet-500 to-purple-500 transition-all duration-300" style="width: ${progressPercent}%"></div>
                    </div>
                    <p class="text-white/40 text-xs mt-2 progress-percent">${progressPercentDisplay}%</p>
                </div>

                <!-- 卡片内容 -->
                <div class="flex items-start justify-between mb-3 opacity-50">
                    <h3 class="text-lg font-bold truncate flex-1 mr-2">${series.seriesName || '未命名'}</h3>
                    <span class="status-badge status-initializing flex-shrink-0">处理中</span>
                </div>
                <p class="text-sm text-white/60 mb-4 line-clamp-2 h-10">${series.background || '暂无背景设定'}</p>
                <div class="flex items-center justify-between text-sm text-white/40">
                    <span><i data-lucide="users" class="w-4 h-4 inline mr-1"></i>${series.roleCount || 0} 个角色</span>
                    <span>${series.createdAt ? series.createdAt.substring(0, 10) : ''}</span>
                </div>
            </div>
        `;
    } else {
        // 正常状态
        const isLocked = series.status === 2 || series.status === 3;
        const statusClass = isLocked ? 'status-locked' : 'status-pending';
        const statusText = isLocked ? '已锁定' : (series.statusDesc || '待审核');

        return `
            <div class="glass-card glass-card-hover p-6 relative group">
                <div class="cursor-pointer" onclick="location.href='/${series.id}/review/'">
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="text-lg font-bold truncate flex-1 mr-2">${series.seriesName || '未命名'}</h3>
                        <span class="status-badge ${statusClass} flex-shrink-0">
                            ${statusText}
                        </span>
                    </div>
                    <p class="text-sm text-white/60 mb-4 line-clamp-2 h-10">${series.background || '暂无背景设定'}</p>
                    <div class="flex items-center justify-between text-sm text-white/40">
                        <span><i data-lucide="users" class="w-4 h-4 inline mr-1"></i>${series.roleCount || 0} 个角色</span>
                        <span>${series.createdAt ? series.createdAt.substring(0, 10) : ''}</span>
                    </div>
                </div>
                <!-- 删除按钮 -->
                <button onclick="event.stopPropagation(); showDeleteConfirm(${series.id}, '${series.seriesName || '未命名'}')"
                    class="absolute top-4 right-4 p-2 rounded-lg bg-white/5 hover:bg-red-500/20 hover:text-red-400 transition-all opacity-0 group-hover:opacity-100"
                    title="删除系列">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        `;
    }
}

function renderPagination(total, currentPage) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.getElementById('pagination');

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = '';

    // 上一页
    if (currentPage > 1) {
        html += `<button onclick="loadSeries(${currentPage - 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>`;
    }

    // 页码
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
        html += `<button onclick="loadSeries(1)" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">1</button>`;
        if (startPage > 2) html += `<span class="text-white/40">...</span>`;
    }

    for (let i = startPage; i <= endPage; i++) {
        if (i === currentPage) {
            html += `<button class="px-4 py-2 rounded-lg bg-violet-500/30 text-violet-300 font-medium">${i}</button>`;
        } else {
            html += `<button onclick="loadSeries(${i})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${i}</button>`;
        }
    }

    if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="text-white/40">...</span>`;
        html += `<button onclick="loadSeries(${totalPages})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${totalPages}</button>`;
    }

    // 下一页
    if (currentPage < totalPages) {
        html += `<button onclick="loadSeries(${currentPage + 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>`;
    }

    // 总数
    html += `<span class="text-white/40 text-sm ml-4">共 ${total} 个系列</span>`;

    pagination.innerHTML = html;
    safeCreateIcons();
}

// WebSocket 连接
function connectWebSocket() {
    if (processingSeries.length === 0) return;

    // WebSocket 连接到后端服务器（端口 8081）
    const socket = new SockJS('http://localhost:8081/api/ws');
    stompClient = Stomp.over(socket);

    // 禁用调试日志
    stompClient.debug = null;

    stompClient.connect({}, function(frame) {
        console.log('WebSocket 连接成功');

        // 订阅所有处理中系列的进度
        processingSeries.forEach(seriesId => {
            stompClient.subscribe('/topic/series/' + seriesId, function(message) {
                const progress = JSON.parse(message.body);
                updateSeriesProgress(progress);
            });
        });
    }, function(error) {
        console.log('WebSocket 连接失败，5秒后重试');
        setTimeout(connectWebSocket, 5000);
    });
}

function updateSeriesProgress(progress) {
    // 停止模拟进度
    stopFakeProgress(progress.seriesId);

    // 存储进度
    seriesProgress[progress.seriesId] = progress;
    saveProgress();

    // 更新对应的卡片
    const card = document.querySelector(`.series-card[data-series-id="${progress.seriesId}"]`);
    if (!card) return;

    const progressBar = card.querySelector('.progress-bar');
    const progressText = card.querySelector('.progress-text');
    const progressPercentEl = card.querySelector('.progress-percent');

    if (progressBar) {
        progressBar.style.width = progress.progressPercent + '%';
    }
    if (progressText) {
        progressText.textContent = progress.message;
    }
    if (progressPercentEl) {
        progressPercentEl.textContent = progress.progressPercent + '%';
    }

    // 处理完成
    if (progress.status === 'COMPLETED') {
        // 清除保存的进度
        delete seriesProgress[progress.seriesId];
        saveProgress();

        // 停止模拟进度
        stopFakeProgress(progress.seriesId);

        // 从处理中列表移除
        const idx = processingSeries.indexOf(progress.seriesId);
        if (idx > -1) {
            processingSeries.splice(idx, 1);
        }

        // 显示完成提示
        const overlay = card.querySelector('.processing-overlay');
        if (overlay) {
            overlay.innerHTML = `
                <div class="text-center">
                    <i data-lucide="check-circle" class="w-12 h-12 text-green-400 mx-auto mb-2"></i>
                    <p class="text-green-400 font-medium">处理完成！</p>
                </div>
            `;
            safeCreateIcons();
        }

        // 2秒后刷新页面
        setTimeout(() => {
            loadSeries(currentPage);
        }, 2000);
    }

    // 处理失败
    if (progress.status === 'FAILED') {
        // 清除保存的进度
        delete seriesProgress[progress.seriesId];
        saveProgress();

        // 停止模拟进度
        stopFakeProgress(progress.seriesId);

        // 从处理中列表移除
        const idx = processingSeries.indexOf(progress.seriesId);
        if (idx > -1) {
            processingSeries.splice(idx, 1);
        }

        const overlay = card.querySelector('.processing-overlay');
        if (overlay) {
            overlay.innerHTML = `
                <div class="text-center">
                    <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-2"></i>
                    <p class="text-red-400 font-medium">${progress.message}</p>
                </div>
            `;
            safeCreateIcons();
        }
    }
}

// 模拟进度动画（当没有 WebSocket 真实进度时使用）
const fakeProgressTimers = {};
const messages = ['正在初始化...', '正在生成角色图片...', '正在优化图片质量...', '即将完成，请稍候...'];

function startFakeProgress(seriesId) {
    if (fakeProgressTimers[seriesId]) return; // 已经在运行

    const card = document.querySelector(`.series-card[data-series-id="${seriesId}"]`);
    if (!card) return;

    // 从内存中获取当前进度（可能已被 storage 事件更新）
    let percent = 15;
    if (seriesProgress[seriesId] && typeof seriesProgress[seriesId].progressPercent === 'number') {
        percent = seriesProgress[seriesId].progressPercent;
    }

    // 如果已经到达或超过99%，不再启动模拟
    if (percent >= 99) {
        console.log('进度已到99%以上，不再模拟');
        return;
    }

    console.log('启动进度模拟，起始进度:', percent);

    fakeProgressTimers[seriesId] = setInterval(() => {
        // 检查内存中的进度是否比自己大（可能被 storage 事件更新了）
        const memPercent = seriesProgress[seriesId] && seriesProgress[seriesId].progressPercent;
        if (typeof memPercent === 'number' && memPercent > percent) {
            percent = memPercent; // 同步到更大的进度
        }

        // 如果已完成或失败，停止模拟
        const status = seriesProgress[seriesId] && seriesProgress[seriesId].status;
        if (status === 'COMPLETED' || status === 'FAILED') {
            clearInterval(fakeProgressTimers[seriesId]);
            delete fakeProgressTimers[seriesId];
            return;
        }

        // 模拟进度增长（越来越慢，最高到 99.99%）
        let increment;
        if (percent < 30) {
            // 0-30%: 较快
            increment = 3 + Math.random() * 2;
        } else if (percent < 60) {
            // 30-60%: 中等速度
            increment = 1.5 + Math.random() * 1;
        } else if (percent < 85) {
            // 60-85%: 较慢
            increment = 0.6 + Math.random() * 0.4;
        } else if (percent < 95) {
            // 85-95%: 慢
            increment = 0.25 + Math.random() * 0.15;
        } else {
            // 95-99.99%: 非常慢
            increment = 0.08 + Math.random() * 0.05;
        }

        percent = Math.min(percent + increment, 99.99);

        const progressBar = card.querySelector('.progress-bar');
        const progressText = card.querySelector('.progress-text');
        const progressPercentEl = card.querySelector('.progress-percent');

        if (progressBar) {
            progressBar.style.width = percent + '%';
        }
        if (progressText) {
            const msgIndex = Math.min(Math.floor(percent / 25), messages.length - 1);
            progressText.textContent = messages[msgIndex];
        }
        if (progressPercentEl) {
            // 显示小数点后2位
            progressPercentEl.textContent = percent.toFixed(2) + '%';
        }

        // 保存进度到内存和 localStorage
        seriesProgress[seriesId] = {
            progressPercent: percent,
            message: messages[Math.min(Math.floor(percent / 25), messages.length - 1)]
        };
        saveProgress();

    }, 1500); // 每1.5秒更新一次
}

function stopFakeProgress(seriesId) {
    if (fakeProgressTimers[seriesId]) {
        clearInterval(fakeProgressTimers[seriesId]);
        delete fakeProgressTimers[seriesId];
    }
}

// 轮询检查系列状态（WebSocket备用方案）
const pollTimers = {};

function startPolling(seriesId) {
    if (pollTimers[seriesId]) return;

    pollTimers[seriesId] = setInterval(() => {
        fetch(`/api/${seriesId}/progress/`)
            .then(response => response.json())
            .then(data => {
                // API 返回 seriesStatus，检查是否不再是处理中状态(0)
                const status = data.seriesStatus !== undefined ? data.seriesStatus : data.status;
                if (status !== 0 && status !== '0') {
                    // 状态不再是处理中，停止轮询和模拟进度
                    stopPolling(seriesId);
                    stopFakeProgress(seriesId);

                    // 清除保存的进度
                    delete seriesProgress[seriesId];
                    saveProgress();

                    // 从处理中列表移除
                    const idx = processingSeries.indexOf(seriesId);
                    if (idx > -1) {
                        processingSeries.splice(idx, 1);
                    }

                    // 显示完成提示
                    const card = document.querySelector(`.series-card[data-series-id="${seriesId}"]`);
                    if (card) {
                        const overlay = card.querySelector('.processing-overlay');
                        if (overlay) {
                            overlay.innerHTML = `
                                <div class="text-center">
                                    <i data-lucide="check-circle" class="w-12 h-12 text-green-400 mx-auto mb-2"></i>
                                    <p class="text-green-400 font-medium">处理完成！</p>
                                </div>
                            `;
                            safeCreateIcons();
                        }
                    }

                    // 2秒后刷新列表
                    setTimeout(() => loadSeries(currentPage), 2000);
                }
            })
            .catch(err => console.error('轮询失败:', err));
    }, 5000); // 每5秒检查一次
}

function stopPolling(seriesId) {
    if (pollTimers[seriesId]) {
        clearInterval(pollTimers[seriesId]);
        delete pollTimers[seriesId];
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadSeries(1);

    // 如果有处理中的系列，连接 WebSocket 并启动模拟进度
    if (processingSeries.length > 0) {
        connectWebSocket();
        // 延迟启动模拟进度，等待卡片渲染完成
        setTimeout(() => {
            processingSeries.forEach(seriesId => {
                startFakeProgress(seriesId);
                startPolling(seriesId); // 同时启动轮询作为备用
            });
        }, 500);
    }
});

// 删除相关函数
let deletingSeriesId = null;

function showDeleteConfirm(seriesId, seriesName) {
    deletingSeriesId = seriesId;
    document.getElementById('deleteSeriesName').textContent = seriesName;
    document.getElementById('deleteModal').classList.remove('hidden');
    document.getElementById('deleteModal').classList.add('flex');
}

function closeDeleteModal() {
    deletingSeriesId = null;
    document.getElementById('deleteModal').classList.add('hidden');
    document.getElementById('deleteModal').classList.remove('flex');
}

function confirmDelete() {
    if (!deletingSeriesId) return;

    fetch(`/api/series/${deletingSeriesId}/delete/`, {
        method: 'DELETE',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCookie('csrftoken'),
        }
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            closeDeleteModal();
            loadSeries(currentPage);
        } else {
            alert('删除失败: ' + (result.error || '未知错误'));
        }
    })
    .catch(err => {
        alert('删除失败: ' + err.message);
    });
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
