{% extends "base.html" %}

{% block title %}首页 - Manga AI{% endblock %}

{% block content %}
<!-- Hero Section -->
<div class="text-center py-12">
    <h1 class="text-4xl font-bold mb-4">
        <span class="gradient-text">AI 智能漫剧制作系统</span>
    </h1>
    <p class="text-white/50 max-w-2xl mx-auto mb-8">
        一键生成标准化角色资产，告别重复劳动，让创作更高效
    </p>
    <a href="/init/" class="btn-neon text-lg px-8 py-3 inline-flex items-center gap-2">
        <i data-lucide="plus" class="w-5 h-5"></i>创建新系列
    </a>
</div>

<!-- Series List -->
<div class="mt-8">
    <h2 class="text-2xl font-bold mb-6">我的系列</h2>
    <div id="seriesList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="glass-card p-8 text-center col-span-full">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-white/50">加载中...</p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-4 mt-8"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
const pageSize = 9;
let totalSeries = 0;

function loadSeries(page) {
    currentPage = page;
    const container = document.getElementById('seriesList');
    container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><div class="spinner mx-auto mb-4"></div><p class="text-white/50">加载中...</p></div>';

    fetch(`/api/series/list/?page=${page}&pageSize=${pageSize}`)
        .then(response => response.json())
        .then(result => {
            if (result.data && result.data.list && result.data.list.length > 0) {
                totalSeries = result.data.total;
                container.innerHTML = result.data.list.map(series => `
                    <div class="glass-card glass-card-hover p-6 cursor-pointer" onclick="location.href='/${series.id}/review/'">
                        <div class="flex items-start justify-between mb-3">
                            <h3 class="text-lg font-bold truncate flex-1 mr-2">${series.seriesName || '未命名'}</h3>
                            <span class="status-badge ${series.status === 2 ? 'status-locked' : series.status === 1 ? 'status-pending' : 'status-initializing'} flex-shrink-0">
                                ${series.statusDesc || '待审核'}
                            </span>
                        </div>
                        <p class="text-sm text-white/60 mb-4 line-clamp-2 h-10">${series.outline || '暂无简介'}</p>
                        <div class="flex items-center justify-between text-sm text-white/40">
                            <span><i data-lucide="users" class="w-4 h-4 inline mr-1"></i>${series.roleCount || 0} 个角色</span>
                            <span>${series.createdAt ? series.createdAt.substring(0, 10) : ''}</span>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
                renderPagination(result.data.total, page);
            } else {
                container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><p class="text-white/50">暂无系列，点击上方按钮创建</p></div>';
                document.getElementById('pagination').innerHTML = '';
            }
        })
        .catch(err => {
            container.innerHTML = '<div class="glass-card p-8 text-center col-span-full"><p class="text-red-400">加载失败: ' + err.message + '</p></div>';
        });
}

function renderPagination(total, currentPage) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.getElementById('pagination');

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = '';

    // 上一页
    if (currentPage > 1) {
        html += `<button onclick="loadSeries(${currentPage - 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>`;
    }

    // 页码
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
        html += `<button onclick="loadSeries(1)" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">1</button>`;
        if (startPage > 2) html += `<span class="text-white/40">...</span>`;
    }

    for (let i = startPage; i <= endPage; i++) {
        if (i === currentPage) {
            html += `<button class="px-4 py-2 rounded-lg bg-violet-500/30 text-violet-300 font-medium">${i}</button>`;
        } else {
            html += `<button onclick="loadSeries(${i})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${i}</button>`;
        }
    }

    if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="text-white/40">...</span>`;
        html += `<button onclick="loadSeries(${totalPages})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${totalPages}</button>`;
    }

    // 下一页
    if (currentPage < totalPages) {
        html += `<button onclick="loadSeries(${currentPage + 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>`;
    }

    // 总数
    html += `<span class="text-white/40 text-sm ml-4">共 ${total} 个系列</span>`;

    pagination.innerHTML = html;
    lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', function() {
    loadSeries(1);
});
</script>
<style>
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
{% endblock %}
