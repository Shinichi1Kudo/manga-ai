<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 海带 AI 智能短剧制作系统</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 30px 0;
            background: #0a0a0f;
        }

        /* 高端背景 */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -3;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.3), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(74, 222, 128, 0.15), transparent),
                radial-gradient(ellipse 40% 60% at 0% 50%, rgba(147, 51, 234, 0.2), transparent);
        }

        /* 网格背景 */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: 60px 60px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 40%, transparent 100%);
        }

        /* 浮动光球 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 20s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-purple {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, transparent 70%);
            top: -200px;
            right: -200px;
        }

        .orb-green {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.3) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.05); }
            66% { transform: translate(-30px, 50px) scale(0.95); }
        }

        /* 主卡片 */
        .auth-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 40px 48px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(60px) saturate(150%);
            -webkit-backdrop-filter: blur(60px) saturate(150%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 40px 80px -20px rgba(0, 0, 0, 0.6),
                0 0 100px -50px rgba(74, 222, 128, 0.3);
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片光晕 */
        .card-glow {
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg,
                rgba(74, 222, 128, 0.2) 0%,
                transparent 30%,
                transparent 70%,
                rgba(34, 211, 238, 0.2) 100%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .auth-card:hover .card-glow {
            opacity: 1;
        }

        /* Logo区域 */
        .logo-wrap {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #22c55e 0%, #0891b2 50%, #6366f1 100%);
            border-radius: 20px;
            margin-bottom: 16px;
            position: relative;
            box-shadow:
                0 20px 40px -10px rgba(74, 222, 128, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-icon-wrap:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .logo-icon-wrap::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.5), rgba(99, 102, 241, 0.5));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.6;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #86efac 50%, #67e8f9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* 标题 */
        .auth-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* 礼品横幅 */
        .gift-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(34, 211, 238, 0.1));
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #86efac;
            position: relative;
            overflow: hidden;
        }

        .gift-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .gift-icon {
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(10deg); }
        }

        /* 表单 */
        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-label span {
            text-transform: none;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(74, 222, 128, 0.5);
            background: rgba(74, 222, 128, 0.05);
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.1);
        }

        .form-input:focus ~ .input-icon {
            color: #4ade80;
        }

        /* 验证码按钮 */
        .code-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 14px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 211, 238, 0.2));
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .code-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.3), rgba(34, 211, 238, 0.3));
            transform: translateY(-50%) scale(1.02);
        }

        .code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #22c55e 0%, #0891b2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px -10px rgba(74, 222, 128, 0.4);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -15px rgba(74, 222, 128, 0.5);
        }

        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:hover::after { left: 100%; }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* 底部 */
        .auth-footer {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        .auth-footer a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .auth-footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #4ade80, #67e8f9);
            transition: width 0.3s ease;
        }

        .auth-footer a:hover::after {
            width: 100%;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 28px;
            right: 28px;
            padding: 16px 24px;
            border-radius: 16px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 200;
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
        }

        .toast.show { transform: translateX(0); }
        .toast.success { border-color: rgba(74, 222, 128, 0.3); }
        .toast.error { border-color: rgba(248, 113, 113, 0.3); }
        .toast.warning { border-color: rgba(251, 191, 36, 0.3); }

        /* 响应式 */
        @media (max-width: 480px) {
            .auth-card {
                margin: 16px;
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb orb-purple"></div>
    <div class="glow-orb orb-green"></div>

    {% if messages %}
    {% for message in messages %}
    <div class="toast {{ message.tags }} show">
        <i data-lucide="{% if message.tags == 'success' %}check-circle-2{% elif message.tags == 'error' %}circle-x{% else %}circle-alert{% endif %}" class="w-5 h-5"></i>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
    {% endif %}

    <div class="auth-card">
        <div class="card-glow"></div>

        <div class="logo-wrap">
            <div class="logo-icon-wrap">
                <i data-lucide="rocket" class="w-7 h-7"></i>
            </div>
            <div class="logo-text">海带 AI 智能短剧制作系统</div>
        </div>

        <h1 class="auth-title">创建账户</h1>
        <p class="auth-subtitle">开启您的 AI 漫剧创作之旅</p>

        <div class="gift-banner">
            <i data-lucide="gift" class="w-5 h-5 gift-icon"></i>
            <span>新用户注册即送 <strong>10 积分</strong></span>
        </div>

        <form method="post" action="">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">邮箱</label>
                <div class="input-wrapper">
                    <input type="email" name="email" id="email" class="form-input" placeholder="your@email.com" required>
                    <i data-lucide="mail" class="w-4 h-4 input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div class="input-wrapper">
                    <input type="text" name="code" class="form-input" style="padding-right: 100px;" placeholder="输入6位验证码" required maxlength="6">
                    <i data-lucide="key-round" class="w-4 h-4 input-icon"></i>
                    <button type="button" id="sendCodeBtn" class="code-btn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">昵称 <span>(可选)</span></label>
                <div class="input-wrapper">
                    <input type="text" name="nickname" class="form-input" placeholder="给自己起个名字">
                    <i data-lucide="user" class="w-4 h-4 input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" class="form-input" placeholder="至少6位" required minlength="6">
                    <i data-lucide="lock" class="w-4 h-4 input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">确认密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password_confirm" class="form-input" placeholder="再次输入密码" required>
                    <i data-lucide="shield-check" class="w-4 h-4 input-icon"></i>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                立即注册
            </button>
        </form>

        <div class="divider">或</div>

        <div class="auth-footer">
            已有账户？<a href="/auth/login/">立即登录</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(toast => {
                toast.classList.remove('show');
            });
        }, 5000);

        // 发送验证码
        let countdown = 0;
        let timer = null;

        function sendCode() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                alert('请先输入邮箱地址');
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;

            fetch('/auth/send-code/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]').value
                },
                body: JSON.stringify({ email: email, type: 'register' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert('验证码已发送到您的邮箱');
                    startCountdown(60);
                } else {
                    alert(data.message || '发送失败');
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert('发送失败，请稍后重试');
                btn.disabled = false;
            });
        }

        function startCountdown(seconds) {
            countdown = seconds;
            const btn = document.getElementById('sendCodeBtn');
            btn.textContent = countdown + 's';

            timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.textContent = '获取验证码';
                    btn.disabled = false;
                } else {
                    btn.textContent = countdown + 's';
                }
            }, 1000);
        }

        // 表单验证
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password_confirm').value;

            if (password !== confirm) {
                e.preventDefault();
                alert('两次输入的密码不一致');
            }
        });
    </script>
</body>
</html>
