<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 海带 AI 智能短剧制作系统</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0a0a0f;
        }

        /* 高端背景 */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -3;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.3), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(74, 222, 128, 0.15), transparent),
                radial-gradient(ellipse 40% 60% at 0% 50%, rgba(147, 51, 234, 0.2), transparent);
        }

        /* 网格背景 */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: 60px 60px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 40%, transparent 100%);
        }

        /* 浮动光球 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: orbFloat 20s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-purple {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .orb-cyan {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.3) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        .orb-green {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.25) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.05); }
            66% { transform: translate(-30px, 50px) scale(0.95); }
        }

        /* 主卡片 */
        .auth-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(60px) saturate(150%);
            -webkit-backdrop-filter: blur(60px) saturate(150%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 40px 80px -20px rgba(0, 0, 0, 0.6),
                0 0 100px -50px rgba(147, 51, 234, 0.3);
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片光晕 */
        .card-glow {
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg,
                rgba(147, 51, 234, 0.2) 0%,
                transparent 30%,
                transparent 70%,
                rgba(34, 211, 238, 0.2) 100%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .auth-card:hover .card-glow {
            opacity: 1;
        }

        /* Logo区域 */
        .logo-wrap {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 50%, #0891b2 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            box-shadow:
                0 20px 40px -10px rgba(147, 51, 234, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-icon-wrap:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow:
                0 25px 50px -10px rgba(147, 51, 234, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .logo-icon-wrap::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.5), rgba(34, 211, 238, 0.5));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.6;
        }

        .brand-logo-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
        }

        .logo-text {
            display: flex;
            justify-content: center;
        }

        .brand-wordmark {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            line-height: 1;
            white-space: nowrap;
        }

        .brand-name {
            position: relative;
            display: inline-block;
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 0;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 34%, #67e8f9 72%, #fde68a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 12px 28px rgba(34, 211, 238, 0.24);
        }

        .brand-name::after {
            content: '';
            position: absolute;
            left: 8%;
            right: 8%;
            bottom: -0.14em;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(34, 211, 238, 0), rgba(34, 211, 238, 0.85), rgba(253, 230, 138, 0.72), rgba(34, 211, 238, 0));
            box-shadow: 0 0 16px rgba(34, 211, 238, 0.36);
        }

        .brand-subtitle {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0;
            color: rgba(226, 232, 240, 0.84);
        }

        /* 标题 */
        .auth-title {
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 36px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 18px 18px 18px 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(147, 51, 234, 0.5);
            background: rgba(147, 51, 234, 0.05);
            box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.1);
        }

        .form-input:focus ~ .input-icon {
            color: #a78bfa;
            transform: translateY(-50%) scale(1.1);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 32px;
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px -10px rgba(147, 51, 234, 0.5);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -15px rgba(147, 51, 234, 0.6);
        }

        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:hover::after {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 28px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* 底部 */
        .auth-footer {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        .auth-footer a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .auth-footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #a78bfa, #67e8f9);
            transition: width 0.3s ease;
        }

        .auth-footer a:hover {
            color: #c4b5fd;
        }

        .auth-footer a:hover::after {
            width: 100%;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 28px;
            right: 28px;
            padding: 16px 24px;
            border-radius: 16px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 200;
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
        }

        .toast.show { transform: translateX(0); }
        .toast.success { border-color: rgba(74, 222, 128, 0.3); }
        .toast.error { border-color: rgba(248, 113, 113, 0.3); }
        .toast.warning { border-color: rgba(251, 191, 36, 0.3); }

        /* 响应式 */
        @media (max-width: 480px) {
            .auth-card {
                margin: 16px;
                padding: 32px 24px;
            }

            .brand-wordmark {
                gap: 8px;
            }

            .brand-name {
                font-size: 34px;
            }

            .brand-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb orb-purple"></div>
    <div class="glow-orb orb-cyan"></div>
    <div class="glow-orb orb-green"></div>

    {% if messages %}
    {% for message in messages %}
    <div class="toast {{ message.tags }} show">
        <i data-lucide="{% if message.tags == 'success' %}check-circle-2{% elif message.tags == 'error' %}circle-x{% else %}circle-alert{% endif %}" class="w-5 h-5"></i>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
    {% endif %}

    <div class="auth-card">
        <div class="card-glow"></div>

        <div class="logo-wrap">
            <div class="logo-icon-wrap">
                <img src="/site-logo.png?v=20260515" alt="海带 AI 智能短剧制作系统 Logo" class="brand-logo-img">
            </div>
            <div class="logo-text">
                <span class="brand-wordmark" aria-label="海带 AI 智能短剧制作系统">
                    <span class="brand-name">海带</span>
                    <span class="brand-subtitle">AI 智能短剧制作系统</span>
                </span>
            </div>
        </div>

        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录您的账户，继续创作精彩漫剧</p>

        <form method="post" action="">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">邮箱</label>
                <div class="input-wrapper">
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                    <i data-lucide="mail" class="w-5 h-5 input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    <i data-lucide="key-round" class="w-5 h-5 input-icon"></i>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                登录账户
            </button>
        </form>

        <div class="divider">或</div>

        <div class="auth-footer">
            还没有账户？<a href="/auth/register/">立即注册</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(toast => {
                toast.classList.remove('show');
            });
        }, 5000);
    </script>
</body>
</html>
