{% extends "base.html" %}

{% block title %}积分记录 - 海带 AI 内容智能创作平台{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <a href="/" class="p-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="text-2xl font-bold">积分记录</h1>
        </div>
        <div class="flex items-center gap-4">
            <!-- 兑换码入口 -->
            <button onclick="showRedeemModal()" class="px-4 py-2 rounded-xl bg-gradient-to-r from-violet-600/20 to-blue-600/20 border border-violet-500/30 hover:from-violet-600/30 hover:to-blue-600/30 transition-all font-medium text-sm flex items-center gap-2">
                <i data-lucide="gift" class="w-4 h-4"></i>
                兑换码
            </button>
            <div class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 flex items-center gap-2">
                <i data-lucide="coins" class="w-5 h-5 text-yellow-400"></i>
                <span class="font-medium"><span id="pageCredits">0</span> 积分</span>
            </div>
        </div>
    </div>

    <!-- Records List -->
    <div id="recordsList" class="space-y-3">
        <div class="glass-card p-8 text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-white/50">加载中...</p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-4 mt-8"></div>
</div>

<!-- 兑换码弹窗 -->
<div id="redeemModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center" onclick="if(event.target === this) closeRedeemModal()">
    <div class="bg-[#1a1a2e] border border-white/10 rounded-2xl p-8 max-w-md w-full mx-4" onclick="event.stopPropagation()">
        <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-violet-500/30">
                <i data-lucide="gift" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">兑换积分</h3>
            <p class="text-white/50 mb-6">输入兑换码获取积分</p>

            <div class="mb-6">
                <input type="text" id="redeemCodeInput"
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-violet-500 transition-colors text-center text-lg tracking-wider"
                       placeholder="请输入兑换码"
                       maxlength="32">
                <p id="redeemError" class="text-red-400 text-sm mt-2 hidden"></p>
            </div>

            <div class="flex gap-3 justify-center">
                <button onclick="closeRedeemModal()" class="px-6 py-2.5 rounded-xl bg-white/10 hover:bg-white/15 transition-colors font-medium">
                    取消
                </button>
                <button onclick="submitRedeem()" id="redeemBtn" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 transition-colors font-medium">
                    兑换
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .record-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px 20px;
        transition: all 0.3s ease;
    }
    .record-item:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.15);
    }
    .amount-deduct {
        color: #f87171;
    }
    .amount-refund {
        color: #34d399;
    }
    .amount-reward {
        color: #a78bfa;
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
const pageSize = 20;

// 加载用户积分
function loadUserCredits() {
    fetch('/api/user/info/')
        .then(res => res.json())
        .then(data => {
            console.log('用户信息返回:', data);
            if (data.code === 200 && data.data) {
                // 更新页面内的积分显示
                const pageCreditsEl = document.getElementById('pageCredits');
                if (pageCreditsEl) {
                    pageCreditsEl.textContent = data.data.credits || 0;
                }
                // 同时更新导航栏的积分显示
                const navCreditsEl = document.getElementById('userCredits');
                if (navCreditsEl) {
                    navCreditsEl.textContent = data.data.credits || 0;
                }
            }
        })
        .catch(err => console.log('获取积分失败:', err));
}

function loadRecords(page = 1) {
    currentPage = page;
    fetch(`/api/credits/records?page=${page}&pageSize=${pageSize}`)
    .then(res => res.json())
    .then(data => {
        if (data.code === 200) {
            renderRecords(data.data.records || []);
            renderPagination(data.data.total || 0, data.data.current || 1, data.data.size || pageSize);
        } else {
            // 如果是未登录，显示登录提示
            if (data.message === '请先登录' || data.message === 'Token已失效，请重新登录') {
                document.getElementById('recordsList').innerHTML = `
                    <div class="glass-card p-8 text-center">
                        <i data-lucide="log-in" class="w-12 h-12 mx-auto mb-4 text-white/20"></i>
                        <p class="text-white/50 mb-4">${data.message}</p>
                        <a href="/auth/login/" class="px-6 py-3 bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 rounded-xl font-medium transition-all inline-block">
                            前往登录
                        </a>
                    </div>
                `;
                lucide.createIcons();
            } else {
                document.getElementById('recordsList').innerHTML = `
                    <div class="glass-card p-8 text-center">
                        <p class="text-white/50">${data.message || '加载失败'}</p>
                    </div>
                `;
            }
        }
    })
    .catch(err => {
        console.error('加载失败:', err);
        document.getElementById('recordsList').innerHTML = `
            <div class="glass-card p-8 text-center">
                <p class="text-white/50">网络错误，请稍后重试</p>
            </div>
        `;
    });
}

function renderRecords(records) {
    if (!records || records.length === 0) {
        document.getElementById('recordsList').innerHTML = `
            <div class="glass-card p-8 text-center">
                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 text-white/20"></i>
                <p class="text-white/50">暂无积分记录</p>
            </div>
        `;
        lucide.createIcons();
        return;
    }

    let html = records.map(record => {
        const isDeduct = record.amount < 0;
        const isReward = record.type === 'reward';
        let amountClass = isDeduct ? 'amount-deduct' : 'amount-refund';
        if (isReward) amountClass = 'amount-reward';
        const amountText = isDeduct ? record.amount : '+' + record.amount;

        return `
            <div class="record-item flex items-center justify-between">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-white/90">${record.description || '-'}</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm text-white/50">
                        <span>${record.createdAt || '-'}</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-lg font-medium ${amountClass}">${amountText}</div>
                    <div class="text-sm text-white/40">余额: ${record.balanceAfter}</div>
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('recordsList').innerHTML = html;
    lucide.createIcons();
}

function renderPagination(total, currentPage, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    let html = '';

    // Previous button
    if (currentPage > 1) {
        html += `<button onclick="loadRecords(${currentPage - 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>`;
    }

    // Page numbers
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
        html += `<button onclick="loadRecords(1)" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">1</button>`;
        if (startPage > 2) {
            html += `<span class="text-white/40">...</span>`;
        }
    }

    for (let i = startPage; i <= endPage; i++) {
        if (i === currentPage) {
            html += `<button class="px-4 py-2 rounded-lg bg-violet-500/30 border border-violet-500/50">${i}</button>`;
        } else {
            html += `<button onclick="loadRecords(${i})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${i}</button>`;
        }
    }

    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            html += `<span class="text-white/40">...</span>`;
        }
        html += `<button onclick="loadRecords(${totalPages})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">${totalPages}</button>`;
    }

    // Next button
    if (currentPage < totalPages) {
        html += `<button onclick="loadRecords(${currentPage + 1})" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>`;
    }

    document.getElementById('pagination').innerHTML = html;
    lucide.createIcons();
}

// Initial load
loadUserCredits();
loadRecords(1);

// ==================== 兑换码功能 ====================
function showRedeemModal() {
    const modal = document.getElementById('redeemModal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.getElementById('redeemCodeInput').value = '';
    document.getElementById('redeemError').classList.add('hidden');
    setTimeout(() => document.getElementById('redeemCodeInput').focus(), 100);
    lucide.createIcons();
}

function closeRedeemModal() {
    const modal = document.getElementById('redeemModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function submitRedeem() {
    const code = document.getElementById('redeemCodeInput').value.trim();
    const errorEl = document.getElementById('redeemError');
    const btn = document.getElementById('redeemBtn');

    if (!code) {
        errorEl.textContent = '请输入兑换码';
        errorEl.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '兑换中...';

    fetch('/api/credits/redeem/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ code: code })
    })
    .then(res => res.json())
    .then(data => {
        if (data.code === 200) {
            closeRedeemModal();
            showToast(`兑换成功！获得 ${data.data.credits} 积分`);
            loadUserCredits();
            loadRecords(1);
        } else {
            errorEl.textContent = data.message || '兑换失败';
            errorEl.classList.remove('hidden');
        }
    })
    .catch(err => {
        errorEl.textContent = '网络错误，请重试';
        errorEl.classList.remove('hidden');
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '兑换';
    });
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-gradient-to-r from-violet-600 to-blue-600 rounded-xl text-white font-medium shadow-lg shadow-violet-500/30 transition-all duration-300';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-20px)';
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

// 回车键提交
document.getElementById('redeemCodeInput')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        submitRedeem();
    }
});
</script>
{% endblock %}
